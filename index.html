<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한진 집하 수수료 계산기</title>
    <style>
        /* [CSS 스타일] */
        body {
            background-color: #f1f5f9;
            margin: 0;
            padding: 10px;
        }
        .calculator-box {
            max-width: 600px;
            margin: 20px auto;
            padding: 25px;
            border: 1px solid #ddd;
            border-radius: 12px;
            background-color: #fff;
            font-family: sans-serif;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); 
        }
        /* 메인 타이틀 스타일 */
        .main-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #1e293b;
            margin-top: 5px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #475569;
        }
        .input-group select, 
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        #calc_btn {
            width: 100%;
            padding: 15px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #calc_btn:hover {
            background-color: #2563eb; 
        }
        .divider {
            border-top: 1px solid #e2e8f0;
            margin: 25px 0;
        }
        .result-box {
            margin: 20px 0;
            padding: 18px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background-color: #f8fafc;
        }
        .total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
        }
        .total-price {
            color: #e11d48;
            font-size: 22px;
        }
        .notice-box {
            margin: 25px auto 5px auto;
            padding: 15px;
            background-color: #f0fdf4;
            border-left: 4px solid #22c55e;
            border-radius: 4px;
            font-size: 13px;
            color: #475569;
            line-height: 1.6;
            text-align: left; 
            max-width: 95%;
        }
        .notice-box p {
            margin: 8px 0;
        }
    </style>
</head>
<body>

    <div class="calculator-box">
        <div class="main-title">📦 한진 집하 수수료 계산기</div>

        <div class="input-group">
            <label for="calc_type">타입 (선착불 / 신용)</label>
            <select id="calc_type" onchange="handleTypeChange()">
                <option value="선불">선불</option>
                <option value="신용">신용</option>
            </select>
        </div>

        <div class="input-group">
            <label for="calc_fare">운임 입력 (원)</label>
            <input type="number" id="calc_fare" placeholder="예: 3000" oninput="run_calculation_silent()">
        </div>

        <button id="calc_btn">계산하기</button>

        <div class="divider"></div>

        <div class="result-box">
            <div style="display: none;"><span id="out_rate">0</span></div>
            
            <div class="result-row total">
                <span>예상 집하 수수료</span>
                <span class="total-price"><span id="out_result">0</span> 원</span>
            </div>
        </div>

        <div class="notice-box">
            <p>💡 일반적으로는 <strong>총운임 - 사회적합의비용(170원)</strong> 기준으로 금액 구간별 수수료 발생하여 정산되나, 기타비용(도서산간, 항공료 등 한진 전액귀속) 추가 발생 시 예상 수수료보다 실제 수수료가 낮을 수 있습니다.</p>
            <p>💡 해당표는 일반고객사 기준이며, 농협, 홈쇼핑 등 전략고객사의 경우 고객사별로 수수료율이 다르게 적용되어 정확한 수치 파악 불가합니다. 보통 일반고객사 기준보다 낮게 책정되니 참고 부탁드립니다.  </p>
            <p>💡 집하 영업 시 참고하는 용도로만 사용 부탁드립니다.</p>
        </div>
    </div>

    <script>
        // [자바스크립트 로직]
        function find_rate(type, region, baseFare) {
            const thresholds = [0, 1400, 1500, 1600, 1700, 1800, 2000, 2300, 2501, 3500, 4000, 5000];
            
            const data_prepaid = {
                'A': [8, 8, 9, 11, 12, 16, 19, 21, 26.5, 26.5, 31.5, 36.5],
                'B': [8, 8, 9, 11, 12, 16, 19, 21, 28.5, 28.5, 33.5, 38.5],
                'C': [8, 8, 9, 11, 12, 16, 19, 21, 30.5, 30.5, 35.5, 40.5]
            };
            
            const data_credit = {
                'A': [8, 8, 9, 11, 12, 16, 19, 21, 26.5, 26.5, 26.5, 26.5],
                'B': [8, 8, 9, 11, 12, 16, 19, 21, 28.5, 28.5, 28.5, 28.5],
                'C': [8, 8, 9, 11, 12, 16, 19, 21, 30.5, 30.5, 30.5, 30.5]
            };

            if (baseFare >= 6000) {
                if (type === "선불") {
                    if (region === 'A') return 39.5;
                    if (region === 'B') return 41.5;
                    if (region === 'C') return 43.5;
                } else {
                    if (region === 'A') return 26.5;
                    if (region === 'B') return 28.5;
                    if (region === 'C') return 30.5;
                }
            }

            const targetTable = (type === "선불") ? data_prepaid : data_credit;
            const regionRates = targetTable[region];

            if (!regionRates) return 0;

            for (let i = thresholds.length - 1; i >= 0; i--) {
                if (baseFare >= thresholds[i]) {
                    return regionRates[i];
                }
            }
            
            return regionRates[0];
        }

        // 💡 타입 셀렉트 박스 변경 시 호출되는 함수
        function handleTypeChange() {
            run_calculation_silent();
        }

        // 💡 숫자를 타이핑할 때 경고창(Alert) 없이 유연하게 처리해주는 실시간 감지 함수
        function run_calculation_silent() {
            const fareValue = document.getElementById("calc_fare").value.trim();
            const fare = parseFloat(fareValue);

            // 금액이 아직 입력되지 않았거나 170원 이하일 땐 조용히 0원으로 표시
            if (isNaN(fare) || fare <= 170) {
                const outResultEl = document.getElementById("out_result");
                if (outResultEl) outResultEl.innerText = "0";
                return;
            }
            run_calculation(true); // 실시간 연산 모드로 본 함수 실행
        }

        // 메인 계산 실행 함수 (isSilent 파라미터 추가)
        function run_calculation(isSilent = false) {
            const type = document.getElementById("calc_type").value;
            const region = "C"; 
            
            const fareValue = document.getElementById("calc_fare").value.trim();
            const fare = parseFloat(fareValue);

            if (isNaN(fare) || fare <= 170) {
                // 버튼을 직접 눌렀을 때(isSilent가 false일 때)만 경고창을 띄워줌
                if (isSilent !== true) {
                    alert("170원보다 큰 정확한 운임 금액을 입력해주세요.");
                }
                return;
            }

            const baseFare = fare - 170;
            const rate = find_rate(type, region, baseFare);
            const finalFee = baseFare * (rate / 100) * 0.85;

            const outRateEl = document.getElementById("out_rate");
            const outResultEl = document.getElementById("out_result");
            
            if (outRateEl) outRateEl.innerText = rate;
            if (outResultEl) {
                outResultEl.innerText = Math.round(finalFee).toLocaleString();
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            const calcBtn = document.getElementById('calc_btn');
            if (calcBtn) {
                // 버튼을 클릭했을 때는 수동 검증창이 작동하도록 연동
                calcBtn.addEventListener('click', function() {
                    run_calculation(false);
                });
            }
        });
    </script>
</body>
</html>
