<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한진_학암,화순 집하 수수료 계산기</title>
    <style>
        /* [CSS 스타일] */
        body {
            background-color: #f1f5f9;
            margin: 0;
            padding: 10px;
        }
        .calculator-box {
            max-width: 600px;
            margin: 20px auto;
            padding: 25px;
            border: 1px solid #ddd;
            border-radius: 12px;
            background-color: #fff;
            font-family: sans-serif;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); 
        }
        /* 메인 타이틀 스타일 */
        .main-title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #1e293b;
            margin-top: 5px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #475569;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        #calc_btn {
            width: 100%;
            padding: 15px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #calc_btn:hover {
            background-color: #2563eb; 
        }
        .divider {
            border-top: 1px solid #e2e8f0;
            margin: 25px 0;
        }
        .result-box {
            margin: 20px 0;
            padding: 18px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background-color: #f8fafc;
        }
        .total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
        }
        .total-price {
            color: #e11d48;
            font-size: 22px;
        }
        .notice-box {
            margin: 25px auto 5px auto;
            padding: 15px;
            background-color: #f0fdf4;
            border-left: 4px solid #22c55e;
            border-radius: 4px;
            font-size: 13px;
            color: #475569;
            line-height: 1.6;
            text-align: left; 
            max-width: 95%;
        }
        .notice-box p {
            margin: 8px 0;
        }
    </style>
</head>
<body>

    <div class="calculator-box">
        <div class="main-title">📦 한진 집하 수수료 계산기</div>

        <div class="input-group">
            <label for="calc_fare">운임 입력 (원)</label>
            <input type="number" id="calc_fare" placeholder="예: 3000">
        </div>

        <button id="calc_btn">계산하기</button>

        <div class="divider"></div>

        <div class="result-box">
            <div style="display: none;"><span id="out_rate">0</span></div>
            
            <div class="result-row total">
                <span>예상 집하 수수료</span>
                <span class="total-price"><span id="out_result">0</span> 원</span>
            </div>
        </div>

        <div class="notice-box">
            <p>💡 일반적으로는 <strong>총운임 - 사회적합의비용(170원)</strong> 기준으로 금액별 수수료 발생하여 정산되나, 사회적합의비용 제외 다른 항목에서 기타비용이(도서산간, 항공료 등등) 추가 발생할 경우 예상 수수료보다 낮은 수수료가 책정될 수 있습니다.</p>
            <p>💡 집하 영업 시 평균 단가 참고하는 용도로만 사용 부탁드리겠습니다.</p>
        </div>
    </div>

    <script>
        // [자바스크립트 로직]
        function find_rate(type, region, baseFare) {
            const thresholds = [0, 1400, 1500, 1600, 1700, 1800, 2000, 2300, 2501, 3500, 4000, 5000];
            
            // 기존 요율 데이터 전체 온전히 보존
            const data_prepaid = {
                'A': [8, 8, 9, 11, 12, 16, 19, 21, 26.5, 26.5, 31.5, 36.5],
                'B': [8, 8, 9, 11, 12, 16, 19, 21, 28.5, 28.5, 33.5, 38.5],
                'C': [8, 8, 9, 11, 12, 16, 19, 21, 30.5, 30.5, 35.5, 40.5]
            };
            
            const data_credit = {
                'A': [8, 8, 9, 11, 12, 16, 19, 21, 26.5, 26.5, 26.5, 26.5],
                'B': [8, 8, 9, 11, 12, 16, 19, 21, 28.5, 28.5, 28.5, 28.5],
                'C': [8, 8, 9, 11, 12, 16, 19, 21, 30.5, 30.5, 30.5, 30.5]
            };

            if (baseFare >= 6000) {
                if (type === "선불") {
                    if (region === 'A') return 39.5;
                    if (region === 'B') return 41.5;
                    if (region === 'C') return 43.5;
                } else {
                    if (region === 'A') return 26.5;
                    if (region === 'B') return 28.5;
                    if (region === 'C') return 30.5;
                }
            }

            const targetTable = (type === "선불") ? data_prepaid : data_credit;
            const regionRates = targetTable[region];

            if (!regionRates) return 0;

            for (let i = thresholds.length - 1; i >= 0; i--) {
                if (baseFare >= thresholds[i]) {
                    return regionRates[i];
                }
            }
            
            return regionRates[0];
        }

        function run_calculation() {
            // 외부 선택창 대신 내부에서 자동으로 '선불' 및 'C'급지로 세팅하여 연산
            const type = "선불";
            const region = "C";
            const fareValue = document.getElementById("calc_fare").value.trim();
            const fare = parseFloat(fareValue);

            if (isNaN(fare) || fare <= 170) {
                alert("170원보다 큰 정확한 운임 금액을 입력해주세요.");
                return;
            }

            const baseFare = fare - 170;
            const rate = find_rate(type, region, baseFare);
            
            // 기존 집하 수수료 요율 계산 공식 적용 (최종 금액의 85% 반영 후 반올림)
            const finalFee = baseFare * (rate / 100) * 0.85;

            const outRateEl = document.getElementById("out_rate");
            const outResultEl = document.getElementById("out_result");
            
            if (outRateEl) outRateEl.innerText = rate;
            if (outResultEl) {
                outResultEl.innerText = Math.round(finalFee).toLocaleString();
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            const calcBtn = document.getElementById('calc_btn');
            if (calcBtn) {
                calcBtn.addEventListener('click', run_calculation);
            }
        });
    </script>
</body>
</html>
